name: adto-company-profile

services:
  # ── MySQL ────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: adto-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-adto_company}
      MYSQL_USER: ${DB_USERNAME:-adto}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - adto-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: adto-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - adto-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PHP-FPM (Laravel) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      target: runtime
    container_name: adto-backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./logs/php:/var/log/php
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adto-network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Queue Worker ─────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      target: runtime
    container_name: adto-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adto-network

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
      target: runner
    container_name: adto-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://nginx/api}
      - NODE_ENV=production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - adto-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx ────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: adto-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./backend/storage/app/public:/var/www/html/public/storage:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - adto-network

  # ── Scheduler (Laravel Cron) ─────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      target: runtime
    container_name: adto-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    working_dir: /var/www/html
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adto-network

volumes:
  mysql_data:
  redis_data:

networks:
  adto-network:
    driver: bridge
